name: Sync Rules
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

# 强制使用 Node.js 24 解决你的警告问题
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge_rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download and Merge
        run: |
          # 1. 下载并合并
          curl -sL "hhttps://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/China/China.list" > temp.txt
          #curl -sL "https://githubusercontent.com" >> temp.txt
          
          # 2. 改进的提取逻辑：
          # - 去掉注释行 (#)
          # - 去掉空行
          # - 去掉每行末尾的 ,DIRECT
          # - 只保留看起来像域名或规则的内容
          grep -v '^#' temp.txt | grep -v '^$' | sed 's/,DIRECT//g' | sort -u > cn_merged.txt


      - name: Push to Repository
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add cn_merged.txt
          # 只有文件有变化才提交，没变化直接跳过
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update: $(date)" && git push origin main)
